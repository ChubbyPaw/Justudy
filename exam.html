<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>考试ing</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --primary: #163b75;
            --primary2: #2756a6;
            --line: #dbe2ef;
            --text: #1c2333;
            --muted: #6b7280;
            --ok: #167c3b;
            --danger: #c0382b;
            --soft: #eff4ff;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--line);
        }

        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 16px;
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary)
        }

        .status {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--muted)
        }

        .pill {
            background: var(--soft);
            padding: 8px 12px;
            border-radius: 999px
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 60px
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(16,24,40,.06);
            padding: 22px;
            margin-bottom: 18px;
        }

        .notice {
            line-height: 1.9
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center
        }

        .btn {
            display: inline-block;
            border: none;
            background: var(--primary);
            color: #fff;
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--primary2)
        }

        .btn.secondary {
            background: #eef3fb;
            color: var(--primary);
            border: 1px solid var(--line)
        }

        .btn.danger {
            background: var(--danger)
        }

        .progress {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: #e7edf6;
            overflow: hidden;
            margin-top: 12px;
        }

            .progress > div {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg,#123d82,#4377cf);
                transition: width .25s ease;
            }

        h2.sec {
            margin: 8px 0 16px;
            font-size: 24px;
            color: #12315f;
            border-left: 6px solid var(--primary);
            padding-left: 12px;
        }

        .question {
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 14px;
            margin-bottom: 14px;
            background: #fff;
        }

        .q-title {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.8
        }

        .q-score {
            color: #8b6e00;
            font-size: 13px;
            margin-top: 4px
        }

        .options {
            margin-top: 10px;
            display: grid;
            gap: 8px
        }

        .options.inline {
            display: flex;
            gap: 10px;
        }

        label.option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border: 1px solid #e3e8f3;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            background: #fafcff;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cfd7e6;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
            line-height: 1.7
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px
        }

        .muted {
            color: var(--muted)
        }

        .result {
            border: 1px solid #b7e2c2;
            background: #f4fff7;
            border-radius: 14px;
            padding: 18px;
            margin-top: 18px;
        }

        .score-big {
            font-size: 36px;
            font-weight: 800;
            color: var(--ok)
        }

        .hidden {
            display: none
        }

        .result-list {
            line-height: 2
        }

        .small {
            font-size: 13px;
            color: var(--muted)
        }

        .code-block {
            background: #0b1220;
            color: #e6edf3;
            border-radius: 10px;
            padding: 12px;
            overflow: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Noto Sans Mono", monospace;
            font-size: 16px;
            line-height: 1.3;
            border: 1px solid rgba(255,255,255,0.04);
            white-space: pre;
        }

        .code-block code {
            display: block;
            white-space: pre;
            font-size: inherit;
        }

        /* 覆盖高亮主题的白底，保持与 .code-block 一致的深色外观 */
        .code-block .hljs,
        .code-block pre,
        .code-block pre code {
            background: transparent !important;
            color: inherit !important;
            box-shadow: none !important;
            padding: 0 !important;           /* 主题可能给内层加了 padding，移除以使用外层 padding */
            border-radius: 0 !important;
        }

        /* 保证 pre 不会有额外 margin 干扰圆角显示 */
        .code-block pre { margin: 0; }

        /* 如果主题为 .hljs 添加了背景图片或渐变，也一并清除 */
        .code-block .hljs { background-image: none !important; }

        @media (max-width:760px) {
            .row {
                grid-template-columns: 1fr
            }
            .code-block {
                font-size: 14px;
                line-height: 1.6;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-inner">
            <div class="title" id="examTitleTop">NOIP 在线考试</div>
            <div class="status">
                <div class="pill">剩余时间：<strong id="timer">--:--:--</strong></div>
                <div class="pill">答题进度：<strong id="progressText">0 / 0</strong></div>
                <div class="pill">总分：<strong id="totalScoreText">0</strong></div>
            </div>
        </div>
    </div>

    <div class="wrap">
        <section class="panel">
            <div class="notice">
                <h2 class="sec">考生须知</h2>
                <div id="introText">
                    正在加载试卷。请保持网络连接正常。页面将从 GitHub 仓库读取对应的 XLSX 题库文件。
                </div>
            </div>
            <div class="controls" style="margin-top:14px;">
                <a class="btn secondary" href="./index.html">返回主页</a>
                <button class="btn danger" id="submitBtn" type="button">交卷并判分</button>
            </div>
            <div class="progress"><div id="progressBar"></div></div>
        </section>

        <section class="panel">
            <h2 class="sec">考生信息</h2>
            <div class="row">
                <input id="studentName" type="text" placeholder="请输入姓名">
                <input id="studentClass" type="text" placeholder="请输入班级 / 编号">
            </div>
            <div class="small" style="margin-top:10px;">本页面支持统一考试页加载多套试卷；试卷内容来自不同的 XLSX 文件。</div>
        </section>

        <section class="panel hidden" id="singleChoiceSection">
            <h2 class="sec">单项选择题</h2>
            <div id="singleChoiceList"></div>
        </section>

        <section class="panel hidden" id="fillBlankSection">
            <h2 class="sec">填空题</h2>
            <div id="fillBlankList"></div>
        </section>

        <section class="panel hidden" id="trueFalseSection">
            <h2 class="sec">判断题</h2>
            <div id="trueFalseList"></div>
        </section>

        <section class="panel hidden" id="programmingSection">
            <h2 class="sec">程序设计题</h2>
            <div id="programmingList"></div>
        </section>

        <section class="panel hidden" id="resultPanel">
            <h2 class="sec">交卷结果</h2>
            <div class="result">
                <div>客观题得分</div>
                <div class="score-big"><span id="objectiveScore">0</span> / <span id="objectiveTotal">0</span></div>
                <div class="result-list" id="resultList"></div>
            </div>
        </section>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        /* 保持外层 .code-block 为等宽字体，确保内部高亮元素也继承等宽 */
        .code-block {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Noto Sans Mono", monospace;
        }

        /* 仅清除高亮主题在内层添加的背景/内边距，同时强制继承等宽字体 */
        .code-block .hljs,
        .code-block pre,
        .code-block pre code {
            background: transparent !important;
            color: inherit !important;
            box-shadow: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            font-family: inherit !important; /* 强制使用 .code-block 的等宽字体 */
            font-size: inherit !important;
        }

        /* 保证 pre 不会有额外 margin 干扰圆角显示 */
        .code-block pre { margin: 0; }

        /* 如果主题为 .hljs 添加了背景图片或渐变，也一并清除 */
        .code-block .hljs { background-image: none !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        const state = {
            config: { title: "考试ing", duration: 120, instructions: "" },
            singleChoiceQuestions: [],
            fillBlankQuestions: [],
            trueFalseQuestions: [],
            programmingQuestions: [],
            timerSeconds: 0,
            timerId: null
        };

        function qs(id) { return document.getElementById(id); }
        function text(v) { return (v ?? "").toString().trim(); }

        function safeLower(v) {
            return text(v).replace(/\s+/g, " ").toLowerCase();
        }

        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        async function fetchArrayBuffer(path) {
            const res = await fetch(path, { cache: "no-store" });
            if (!res.ok) throw new Error("读取题库失败：" + path);
            return await res.arrayBuffer();
        }

        function parseConfigSheet(ws) {
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
            const cfg = {};
            rows.forEach(r => {
                const key = text(r[0]);
                const val = r[1];
                if (key) cfg[key] = val;
            });
            return {
                title: text(cfg.Title || cfg.ExamTitle || "NOIP 在线考试"),
                duration: Number(cfg.DurationMinutes || cfg.Duration || 120) || 120,
                instructions: text(cfg.Instructions || "请认真作答，客观题自动判分，程序设计题需人工阅卷。")
            };
        }

        function escapeHtml(v) {
            return (v ?? "").toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function parseSingleChoice(ws) {
            const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
            return rows
                .filter(r => safeLower(r.Enabled || "Y") !== "n")
                .map((r, idx) => ({
                    id: text(r.ID || ("SC" + (idx + 1))),
                    title: text(r.Title),
                    options: [
                        { key: "A", text: text(r.OptionA) },
                        { key: "B", text: text(r.OptionB) },
                        { key: "C", text: text(r.OptionC) },
                        { key: "D", text: text(r.OptionD) }
                    ].filter(x => x.text),
                    codeblock: text(r.CodeBlock || r.Code || r.CodeSnippet || r.CodeSample || ""),
                    codeLang: text(r.CodeLang || r.Language || ""),
                    answer: text(r.Answer).toUpperCase(),
                    score: Number(r.Score || 0) || 0
                }))
                .filter(q => q.title);
        }

        function parseFillBlank(ws) {
            const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
            return rows
                .filter(r => safeLower(r.Enabled || "Y") !== "n")
                .map((r, idx) => ({
                    id: text(r.ID || ("FB" + (idx + 1))),
                    title: text(r.Title),
                    answer: text(r.Answer),
                    score: Number(r.Score || 0) || 0
                }))
                .filter(q => q.title);
        }

        function normalizeTF(v) {
            const s = text(v).toLowerCase();
            if (!s) return "";
            const trueTokens = ["t", "true", "y", "yes", "对", "正确", "是", "1"];
            const falseTokens = ["f", "false", "n", "no", "错", "错误", "否", "0"];
            for (const t of trueTokens) if (s === t || s.startsWith(t)) return "T";
            for (const f of falseTokens) if (s === f || s.startsWith(f)) return "F";
            const first = s[0];
            if (first === "t" || first === "y" || first === "对") return "T";
            if (first === "f" || first === "n" || first === "错") return "F";
            return text(v).toUpperCase();
        }

        function parseTrueFalse(ws) {
            const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
            return rows
                .filter(r => safeLower(r.Enabled || "Y") !== "n")
                .map((r, idx) => ({
                    id: text(r.ID || ("TF" + (idx + 1))),
                    title: text(r.Title),
                    answer: normalizeTF(r.Answer),
                    score: Number(r.Score || 0) || 0
                }))
                .filter(q => q.title);
        }

        function parseProgramming(ws) {
            const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
            return rows
                .filter(r => safeLower(r.Enabled || "Y") !== "n")
                .map((r, idx) => ({
                    id: text(r.ID || ("PG" + (idx + 1))),
                    title: text(r.Title),
                    description: text(r.Description),
                    score: Number(r.Score || 0) || 0
                }))
                .filter(q => q.title);
        }

        function totalScore() {
            return [...state.singleChoiceQuestions, ...state.fillBlankQuestions, ...state.trueFalseQuestions, ...state.programmingQuestions]
                .reduce((s, q) => s + (Number(q.score) || 0), 0);
        }

        function objectiveTotal() {
            return [...state.singleChoiceQuestions, ...state.fillBlankQuestions, ...state.trueFalseQuestions]
                .reduce((s, q) => s + (Number(q.score) || 0), 0);
        }

        function renderQuestions() {
            const scWrap = qs("singleChoiceList");
            const fbWrap = qs("fillBlankList");
            const tfWrap = qs("trueFalseList");
            const pgWrap = qs("programmingList");

            scWrap.innerHTML = "";
            fbWrap.innerHTML = "";
            tfWrap.innerHTML = "";
            pgWrap.innerHTML = "";

            if (state.singleChoiceQuestions.length) {
                qs("singleChoiceSection").classList.remove("hidden");
                state.singleChoiceQuestions.forEach((q, idx) => {
                    const html = `
                                <div class="question">
                                    <div class="q-title">${idx + 1}. ${q.title}</div>
                                    ${q.codeblock ? `<div class="code-block"><pre><code class="${q.codeLang ? 'language-' + escapeHtml(q.codeLang) : ''}">${escapeHtml(q.codeblock)}</code></pre></div>` : ""}
                                    <div class="q-score">分值：${q.score} 分</div>
                                    <div class="options">
                                    ${q.options.map(opt => `
                                        <label class="option">
                                        <input type="radio" name="${q.id}" value="${opt.key}" />
                                        <span>${opt.key}. ${opt.text}</span>
                                        </label>
                                        `).join("")}
                                    </div>
                                </div>
                            `;
                    scWrap.insertAdjacentHTML("beforeend", html);
                });
            }

            if (state.fillBlankQuestions.length) {
                qs("fillBlankSection").classList.remove("hidden");
                state.fillBlankQuestions.forEach((q, idx) => {
                    const html = `
                                <div class="question">
                                    <div class="q-title">${idx + 1}. ${q.title}</div>
                                    <div class="q-score">分值：${q.score} 分</div>
                                    <div style="margin-top:10px;">
                                        <input type="text" id="${q.id}" placeholder="请输入答案" />
                                    </div>
                                </div>
                            `;
                    fbWrap.insertAdjacentHTML("beforeend", html);
                });
            }

            if (state.trueFalseQuestions.length) {
                qs("trueFalseSection").classList.remove("hidden");
                state.trueFalseQuestions.forEach((q, idx) => {
                    const html = `
                                <div class="question">
                                    <div class="q-title">${idx + 1}. ${q.title}</div>
                                    <div class="q-score">分值：${q.score} 分</div>
                                    <div class="options inline">
                                        <label class="option">
                                            <input type="radio" name="${q.id}" value="T" />
                                            <span>正确</span>
                                        </label>
                                        <label class="option">
                                            <input type="radio" name="${q.id}" value="F" />
                                            <span>错误</span>
                                        </label>
                                    </div>
                                </div>
                            `;
                    tfWrap.insertAdjacentHTML("beforeend", html);
                });
            }

            if (state.programmingQuestions.length) {
                qs("programmingSection").classList.remove("hidden");
                state.programmingQuestions.forEach((q, idx) => {
                    const html = `
                                <div class="question">
                                    <div class="q-title">${idx + 1}. ${q.title}</div>
                                    <div class="q-score">分值：${q.score} 分（需人工阅卷）</div>
                                    <div class="muted" style="margin-top:10px;white-space:pre-wrap;line-height:1.9;">${q.description || "请在下方书写代码或解题思路。"}</div>
                                    <div style="margin-top:10px;">
                                    <textarea id="${q.id}" placeholder="请输入代码或解题思路"></textarea>
                                    </div>
                                </div>
                            `;
                    pgWrap.insertAdjacentHTML("beforeend", html);
                });
            }

            bindProgress();
            qs("totalScoreText").textContent = totalScore();

            // 渲染完成后调用高亮（放在 renderQuestions() 的末尾，调用 bindProgress() 之后）
            if (window.hljs) {
                document.querySelectorAll('pre code').forEach(el => {
                    try { hljs.highlightElement(el); } catch (e) { /* 忽略单个高亮错误 */ }
                });
            }
        }

        function answeredCount() {
            let count = 0;
            state.singleChoiceQuestions.forEach(q => {
                if (document.querySelector(`input[name="${q.id}"]:checked`)) count++;
            });
            state.fillBlankQuestions.forEach(q => {
                if (text(qs(q.id)?.value)) count++;
            });
            state.trueFalseQuestions.forEach(q => {
                if (document.querySelector(`input[name="${q.id}"]:checked`)) count++;
            });
            state.programmingQuestions.forEach(q => {
                if (text(qs(q.id)?.value)) count++;
            });
            return count;
        }

        function questionCount() {
            return state.singleChoiceQuestions.length
                + state.fillBlankQuestions.length
                + state.trueFalseQuestions.length
                + state.programmingQuestions.length;
        }

        function updateProgress() {
            const total = questionCount();
            const done = answeredCount();
            const pct = total ? Math.round(done * 100 / total) : 0;
            qs("progressText").textContent = `${done} / ${total}`;
            qs("progressBar").style.width = pct + "%";
        }

        function bindProgress() {
            document.querySelectorAll('input[type="radio"], input[type="text"], textarea').forEach(el => {
                el.addEventListener("change", updateProgress);
                el.addEventListener("input", updateProgress);
            });
            updateProgress();
        }

        function startTimer() {
            if (state.timerId) clearInterval(state.timerId);
            state.timerSeconds = Math.max(0, Number(state.config.duration) * 60);
            function renderTimer() {
                const h = Math.floor(state.timerSeconds / 3600);
                const m = Math.floor((state.timerSeconds % 3600) / 60);
                const s = state.timerSeconds % 60;
                qs("timer").textContent = [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
            }
            renderTimer();
            state.timerId = setInterval(() => {
                state.timerSeconds--;
                renderTimer();
                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerId);
                    submitExam(true);
                }
            }, 1000);
        }

        function submitExam(autoSubmit = false) {
            let score = 0;
            const lines = [];

            state.singleChoiceQuestions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                const ans = selected ? selected.value : "";
                const ok = ans === q.answer;
                if (ok) score += q.score;
                lines.push(`单选题 ${idx + 1}：你的答案 ${ans || "未作答"}，正确答案 ${q.answer || "未设置"}，${ok ? "得分" : "失分"} ${ok ? q.score : 0} / ${q.score}`);
            });

            state.fillBlankQuestions.forEach((q, idx) => {
                const ans = text(qs(q.id)?.value);
                const ok = safeLower(ans) === safeLower(q.answer);
                if (ok) score += q.score;
                lines.push(`填空题 ${idx + 1}：你的答案 ${ans || "未作答"}，标准答案 ${q.answer || "未设置"}，${ok ? "得分" : "失分"} ${ok ? q.score : 0} / ${q.score}`);
            });

            state.trueFalseQuestions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                const ans = selected ? selected.value : "";
                const ok = ans && ans === q.answer;
                if (ok) score += q.score;
                lines.push(`判断题 ${idx + 1}：你的答案 ${ans || "未作答"}，标准答案 ${q.answer || "未设置"}，${ok ? "得分" : "失分"} ${ok ? q.score : 0} / ${q.score}`);
            });

            qs("resultPanel").classList.remove("hidden");
            qs("objectiveScore").textContent = score;
            qs("objectiveTotal").textContent = objectiveTotal();
            qs("resultList").innerHTML = `
                        <div>${autoSubmit ? "时间到，系统已自动交卷。" : "你已完成交卷。"}</div>
                        <div style="margin-top:8px;">考生：${text(qs("studentName").value) || "未填写"} / ${text(qs("studentClass").value) || "未填写"}</div>
                        <div style="margin-top:8px;white-space:pre-wrap;">${lines.join("\n")}</div>
                        <div style="margin-top:10px;">程序设计题需要人工阅卷，不计入上方自动得分。</div>
                    `;
            window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        }

        async function init() {
            try {
                const examFile = getParam("exam");
                if (!examFile) throw new Error("未指定题库文件");
                const ab = await fetchArrayBuffer(examFile);
                const wb = XLSX.read(ab, { type: "array" });
                if (!wb.Sheets["ExamConfig"]) throw new Error("缺少 ExamConfig 工作表");
                state.config = parseConfigSheet(wb.Sheets["ExamConfig"]);
                state.singleChoiceQuestions = wb.Sheets["SingleChoice"] ? parseSingleChoice(wb.Sheets["SingleChoice"]) : [];
                state.fillBlankQuestions = wb.Sheets["FillBlank"] ? parseFillBlank(wb.Sheets["FillBlank"]) : [];
                state.trueFalseQuestions = wb.Sheets["TrueFalse"] ? parseTrueFalse(wb.Sheets["TrueFalse"]) : [];
                state.programmingQuestions = wb.Sheets["Programming"] ? parseProgramming(wb.Sheets["Programming"]) : [];
                qs("examTitleTop").textContent = state.config.title || "NOIP 在线考试";
                qs("introText").innerHTML = `
                            <strong>${state.config.title}</strong><br>
                            考试时长：${state.config.duration} 分钟<br>
                            ${state.config.instructions || "请认真作答，客观题自动判分，程序设计题需人工阅卷。"}<br>
                            当前题库文件：<code>${examFile}</code>
                        `;
                renderQuestions();
                startTimer();
                qs("submitBtn").addEventListener("click", () => submitExam(false));
            } catch (err) {
                qs("introText").innerHTML = `
                            <span style="color:#b42318;font-weight:700;">试卷加载失败：</span>${err.message}<br>
                            请返回主页检查试卷配置文件和题库路径是否正确。
                        `;
            }
        }
        init();
    </script>
</body>
</html>

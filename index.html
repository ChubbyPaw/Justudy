<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justudy</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --primary:#163b75;
      --primary2:#2756a6;
      --line:#dbe2ef;
      --text:#1c2333;
      --muted:#6b7280;
      --ok:#1f7a1f;
      --danger:#b42318;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#eef3fb 0%,#f7f9fc 100%);
    }
    .wrap{max-width:1080px;margin:0 auto;padding:32px 18px 48px}
    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:28px;
      box-shadow:0 10px 30px rgba(22,59,117,.08);
    }
    .badge{
      display:inline-block;
      font-size:13px;
      background:#e8f0ff;
      color:var(--primary);
      padding:6px 10px;
      border-radius:999px;
      font-weight:700;
      letter-spacing:.5px;
    }
    h1{margin:14px 0 10px;font-size:34px;line-height:1.2;color:var(--primary)}
    .sub{margin:0;color:var(--muted);font-size:16px;line-height:1.8}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:18px;
      margin-top:24px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:20px;
      box-shadow:0 8px 24px rgba(16,24,40,.06);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .card h3{
      margin:0;
      font-size:22px;
      color:#12315f;
    }
    .meta{
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
      min-height:52px;
    }
    .actions{margin-top:auto;display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      display:inline-block;
      text-decoration:none;
      border:none;
      background:var(--primary);
      color:#fff;
      padding:11px 16px;
      border-radius:10px;
      font-size:15px;
      cursor:pointer;
      font-weight:700;
    }
    .btn:hover{background:var(--primary2)}
    .btn.secondary{
      background:#eef3fb;
      color:var(--primary);
      border:1px solid var(--line);
    }
    .tip{
      margin-top:24px;
      background:#fffdf2;
      border:1px solid #f0e0a0;
      border-radius:14px;
      padding:18px 20px;
      line-height:1.9;
      color:#6c5b12;
    }
    footer{
      margin-top:28px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }
    .empty{
      margin-top:24px;
      padding:20px;
      border:1px dashed var(--line);
      border-radius:12px;
      background:#fff;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="badge">今天多学一分钟，明天卷死所有人</span>
      <h1>欢迎来到 JUSTUDY 考试系统</h1>
      <p class="sub">
          别人还在玩游戏，<br />
          你已经在写算法；<br />
          别人还在看热闹，<br />
          你已经在造世界; <br />
          在这里悄悄努力，然后卷死所有人。
      </p>
    </section>

    <div id="examList" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">未读取到试卷清单，请检查 <code>exams/exams.json</code> 文件是否存在且格式正确。</div>

    <div class="tip">
      <strong>温馨提示：</strong><br>
      1. 不要小看简单的题，切莫大意和轻敌。<br />
      2. 不要惧怕复杂的题，大胆拆解再前行。<br />
      3. 不要糊弄不懂的题，及时记录并厘清。
    </div>

    <footer>本网站由大熊老师独立开发完成，专为同学们打造的考试网站。</footer>
  </div>

  <script>
    async function loadExamList(){
      const listEl = document.getElementById("examList");
      const emptyEl = document.getElementById("empty");
      try{
        const res = await fetch("./exams/exams.json", {cache:"no-store"});
        if(!res.ok) throw new Error("无法读取 exams.json");
        const exams = await res.json();
        if(!Array.isArray(exams) || exams.length === 0){
          emptyEl.style.display = "block";
          return;
        }
        listEl.innerHTML = exams.map(exam => {
          const file = encodeURIComponent(exam.file || "");
          return `
            <article class="card">
              <h3>${exam.title || "未命名试卷"}</h3>
              <div class="meta">
                ${exam.description || "暂无说明"}<br>
                时长：${exam.duration || "未设置"} 分钟<br>
                文件：${exam.file || "未指定"}
              </div>
              <div class="actions">
                <a class="btn" href="./exam.html?exam=${file}">进入考试</a>
                <a class="btn secondary" href="./${exam.file}" download>下载题库</a>
              </div>
            </article>
          `;
        }).join("");
      }catch(err){
        emptyEl.style.display = "block";
      }
    }
    loadExamList();
  </script>
</body>
</html>
